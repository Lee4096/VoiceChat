# Voice Server Ingress 配置

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voicechat-ingress
  namespace: voicechat
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-write-timeout: "86400"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  rules:
    - host: voicechat.example.com
      http:
        paths:
          # API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: voicechat-http
                port:
                  number: 8080
          # WebSocket
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: voicechat-ws
                port:
                  number: 8081
          # Health
          - path: /health
            pathType: Exact
            backend:
              service:
                name: voicechat-http
                port:
                  number: 8080
          # Default
          - path: /
            pathType: Prefix
            backend:
              service:
                name: voicechat-http
                port:
                  number: 8080
---
