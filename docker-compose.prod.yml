# Voice Server Docker Compose Configuration
# 生产环境配置

version: '3.8'

services:
  # Voice Server
  voicechat-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicechat-server
    restart: always
    ports:
      - "8080:8080"  # HTTP API
      - "8081:8081"  # WebSocket
      - "8082:8082"  # Signaling
    environment:
      - VOICECHAT_SERVER_HOST=0.0.0.0
      - VOICECHAT_SERVER_PORT=8080
      - VOICECHAT_HTTP_PORT=8080
      - VOICECHAT_WEBSOCKET_PORT=8081
      - VOICECHAT_SIGNALING_PORT=8082
      - VOICECHAT_DATABASE_HOST=postgres
      - VOICECHAT_DATABASE_PORT=5432
      - VOICECHAT_DATABASE_USER=postgres
      - VOICECHAT_DATABASE_PASSWORD=${DB_PASSWORD:?DB_PASSWORD required}
      - VOICECHAT_DATABASE_DBNAME=voicechat
      - VOICECHAT_DATABASE_SSLMODE=disable
      - VOICECHAT_REDIS_HOST=redis
      - VOICECHAT_REDIS_PORT=6379
      - VOICECHAT_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - VOICECHAT_LLM_API_KEY=${LLM_API_KEY:?LLM_API_KEY required}
      - VOICECHAT_LOG_LEVEL=INFO
      - VOICECHAT_MODE=production
      - TZ=Asia/Shanghai
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
      - voicechat-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voicechat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: voicechat-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD required}
      - POSTGRES_DB=voicechat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - voicechat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: voicechat-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - voicechat-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: voicechat-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - voicechat-server
    networks:
      - voicechat-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

networks:
  voicechat-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  voicechat-data:
    driver: local
  nginx-logs:
    driver: local
