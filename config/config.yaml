server:
  host: "0.0.0.0"
  port: 8080

http:
  port: 8080
  read_timeout: 30
  write_timeout: 30

websocket:
  port: 8081
  read_timeout: 60
  write_timeout: 60

signaling:
  port: 8082

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "voicechat"
  sslmode: "disable"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "your-secret-key-change-in-production"
  expiration: 86400

oauth2:
  github:
    client_id: ""
    client_secret: ""
    callback_url: "http://localhost:8080/api/v1/auth/callback/github"
  google:
    client_id: ""
    client_secret: ""
    callback_url: "http://localhost:8080/api/v1/auth/callback/google"

voice:
  asr_encoder_path: "./models/paraformer/sherpa-onnx-streaming-paraformer-bilingual-zh-en/encoder.onnx"
  asr_decoder_path: "./models/paraformer/sherpa-onnx-streaming-paraformer-bilingual-zh-en/decoder.onnx"
  asr_tokens_path: "./models/paraformer/sherpa-onnx-streaming-paraformer-bilingual-zh-en/tokens.txt"
  tts_model_path: "./models/kokoro/kokoro-en-v0_19/model.onnx"
  tts_voices_path: "./models/kokoro/kokoro-en-v0_19/voices.bin"
  tts_tokens_path: "./models/kokoro/kokoro-en-v0_19/tokens.txt"
  tts_data_dir: "./models/kokoro/kokoro-en-v0_19/espeak-ng-data"
  sample_rate: 16000
  enable_vad: false
  vad_aggressiveness: 2

llm:
  base_url: "https://openrouter.ai/api/v1"
  api_key: ""
  model: "minimax/minimax-m2.5:free"
  max_tokens: 2048
  temperature: 0.7
  system_prompt: "You are a helpful AI assistant."

log_level: "INFO"
log_format: "json"

mode: "release"
